name: Require resolved conversations

# Fires on PR changes and review activity. GitHub's workflow validator
# rejects the `pull_request_review_thread` event ("Unexpected value"), which
# made this file invalid and produced a failed zero-job run on every push —
# so that trigger is intentionally absent. After resolving threads, re-run
# this check from the PR's checks UI (or push/submit a review) to refresh it.
on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  pull_request_review:
    types: [submitted, dismissed]

jobs:
  check-resolved-threads:
    name: All review threads resolved
    runs-on: ubuntu-latest
    steps:
      - name: Check for unresolved review threads
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const prNumber = context.payload.pull_request?.number;
            if (!prNumber) {
              console.log('No PR number in payload — skipping.');
              return;
            }

            const allThreads = [];
            let cursor = null;
            while (true) {
              const result = await github.graphql(`
                query($owner: String!, $repo: String!, $pr: Int!, $after: String) {
                  repository(owner: $owner, name: $repo) {
                    pullRequest(number: $pr) {
                      reviewThreads(first: 100, after: $after) {
                        nodes {
                          isResolved
                          isOutdated
                        }
                        pageInfo {
                          hasNextPage
                          endCursor
                        }
                      }
                    }
                  }
                }
              `, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                pr: prNumber,
                after: cursor,
              });

              const page = result.repository.pullRequest.reviewThreads;
              allThreads.push(...page.nodes);
              if (!page.pageInfo.hasNextPage) break;
              cursor = page.pageInfo.endCursor;
            }

            const unresolved = allThreads.filter(t => !t.isResolved && !t.isOutdated);

            if (unresolved.length > 0) {
              core.setFailed(
                `${unresolved.length} unresolved review thread(s). Resolve all conversations before merging.`
              );
            } else {
              console.log('All review threads resolved (or none exist).');
            }
