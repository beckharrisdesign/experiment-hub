name: Require resolved conversations

# Fires on PR changes and whenever a review thread is resolved/unresolved,
# so the status check stays current without waiting for a new commit.
on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  pull_request_review:
    types: [submitted, dismissed]
  pull_request_review_thread:
    types: [resolved, unresolved]

jobs:
  check-resolved-threads:
    name: All review threads resolved
    runs-on: ubuntu-latest
    steps:
      - name: Check for unresolved review threads
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const prNumber = context.payload.pull_request?.number;
            if (!prNumber) {
              console.log('No PR number in payload — skipping.');
              return;
            }

            const result = await github.graphql(`
              query($owner: String!, $repo: String!, $pr: Int!) {
                repository(owner: $owner, name: $repo) {
                  pullRequest(number: $pr) {
                    reviewThreads(first: 100) {
                      nodes {
                        isResolved
                        isOutdated
                      }
                    }
                  }
                }
              }
            `, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pr: prNumber,
            });

            const threads = result.repository.pullRequest.reviewThreads.nodes;
            const unresolved = threads.filter(t => !t.isResolved && !t.isOutdated);

            if (unresolved.length > 0) {
              core.setFailed(
                `${unresolved.length} unresolved review thread(s). Resolve all conversations before merging.`
              );
            } else {
              console.log('All review threads resolved (or none exist).');
            }
