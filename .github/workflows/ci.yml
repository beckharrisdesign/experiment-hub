name: CI

on:
  push:
  pull_request:
    branches: [main]

jobs:
  tests:
    name: Feature tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: experiments/simple-seed-organizer/prototype/app/package-lock.json

      - name: Install dependencies
        working-directory: experiments/simple-seed-organizer/prototype/app
        run: npm ci

      - name: Run feature tests
        working-directory: experiments/simple-seed-organizer/prototype/app
        run: npm test

  live-api:
    name: Live API checks
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: experiments/simple-seed-organizer/prototype/app/package-lock.json

      - name: Install dependencies
        working-directory: experiments/simple-seed-organizer/prototype/app
        run: npm ci

      - name: Check live API connections
        working-directory: experiments/simple-seed-organizer/prototype/app
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: npm run test:live
