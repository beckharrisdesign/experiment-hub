name: CI

on:
  push:
  pull_request:
    branches: [main]

jobs:
  # ── Unit tests ─────────────────────────────────────────────────────────────
  # Runs on every push and every PR. No secrets needed — all external calls
  # are mocked. Fast (~10s). Gate before merge.
  unit-tests:
    name: Feature tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

  # ── Live integration tests ──────────────────────────────────────────────────
  # Runs only on push to main (after merge). Hits the real Supabase project.
  # Inserts a test row, verifies it, then cleans up.
  # Requires SUPABASE_URL and SUPABASE_SERVICE_ROLE_KEY in GitHub Actions secrets.
  live-integration:
    name: Live integration tests
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run live integration tests
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: npm run test:live
