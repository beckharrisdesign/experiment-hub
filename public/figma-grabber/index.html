<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Figma Grabber — BHD Labs</title>
  <meta name="description" content="A bookmarklet that captures any element on any page and copies a Figma-ready JSON payload to your clipboard.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400&family=Fraunces:opsz,wght@9..144,600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body { font-family: 'Inter', system-ui, sans-serif; display: flex; flex-direction: column; }

    /* Hero — fills full viewport, two-tone gradient */
    .hero {
      flex: 1;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      /* Green radial (top-right) + lavender linear (bottom-left) over white */
      background:
        linear-gradient(41.96deg, rgba(212, 189, 236, 0.75) 2.83%, rgba(255,255,255,0) 66%),
        radial-gradient(ellipse 70% 55% at 90% 5%, rgba(208, 251, 216, 1) 0%, rgba(255,255,255,0) 65%),
        white;
      padding: 64px 24px;
    }

    /* Centred content stack */
    .hero-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      max-width: 1200px;
    }

    /* Title */
    .hero-title {
      font-family: 'Fraunces', Georgia, serif;
      font-weight: 600;
      font-size: clamp(36px, 5vw, 48px);
      line-height: 1;
      color: #191919;
      font-variation-settings: 'SOFT' 0, 'WONK' 1;
      text-align: center;
      width: 100%;
    }

    /* Two-column instructions — stacks on mobile, side-by-side at 600px+ */
    .instructions {
      display: flex;
      flex-direction: column;
      gap: 32px;
      padding: 40px 0;
      width: 100%;
      text-align: center;
    }
    @media (min-width: 600px) {
      .instructions {
        flex-direction: row;
        gap: 14px;
        padding: 50px clamp(24px, 30%, 360px);
      }
    }
    .instruction-col {
      flex: 1;
      display: flex;
      flex-direction: column;
    }
    .instruction-heading {
      font-family: 'Fraunces', Georgia, serif;
      font-weight: 600;
      font-size: 16px;
      line-height: 20px;
      color: #191919;
      font-variation-settings: 'SOFT' 0, 'WONK' 1;
      margin-bottom: 8px;
    }
    .instruction-body {
      font-family: 'Inter', system-ui, sans-serif;
      font-weight: 400;
      font-size: 14px;
      line-height: 20px;
      color: #191919;
    }

    /* Button group */
    .buttons {
      display: flex;
      gap: 16px;
      align-items: center;
      justify-content: center;
    }

    /* Primary dark bookmarklet button */
    .bookmarklet-btn {
      font-family: 'Fraunces', Georgia, serif;
      font-weight: 600;
      font-size: 24px;
      line-height: 1;
      color: white;
      font-variation-settings: 'SOFT' 0, 'WONK' 1;
      background: #191919;
      border: 1px solid #585858;
      border-radius: 8px;
      padding: 16px 32px;
      box-shadow: 0px 4px 4px rgba(0, 0, 0, 0.25);
      cursor: grab;
      user-select: none;
      text-decoration: none;
      display: inline-block;
      transition: opacity 150ms ease;
      white-space: nowrap;
    }
    .bookmarklet-btn:hover { opacity: 0.85; }
    .bookmarklet-btn:active { cursor: grabbing; }
    .bookmarklet-btn:focus-visible {
      outline: 3px solid #4a90e2;
      outline-offset: 3px;
    }
  </style>
</head>
<body>

  <main>
  <section class="hero" aria-labelledby="hero-title">
    <div class="hero-content">

      <h1 class="hero-title" id="hero-title">Figma Grabber</h1>

      <div class="instructions">
        <div class="instruction-col">
          <h2 class="instruction-heading">To install</h2>
          <p class="instruction-body">Drag this button to your bookmark bar or alt click to create a new one.</p>
        </div>
        <div class="instruction-col">
          <h2 class="instruction-heading">To use</h2>
          <p class="instruction-body">Click the bookmark to copy your browser contents and then paste into Figma.</p>
        </div>
      </div>

      <div class="buttons">
        <a
          class="bookmarklet-btn"
          aria-label="Figma Grabber bookmarklet — drag to your bookmarks bar to install"
          href="javascript:(function()%7B%20var%20NS%3D%22%5Bweb-to-figma-grabber%3Abookmarklet%5D%22%3B%20try%20%7B%20window.__WEB_TO_FIGMA_GRABBER_DEBUG__%20%3D%20window.__WEB_TO_FIGMA_GRABBER_DEBUG__%20%7C%7C%20%7B%20events%3A%20%5B%5D%20%7D%3B%20window.__WEB_TO_FIGMA_GRABBER_DEBUG__.events.push(%7B%20stage%3A%22bookmarklet-start%22%2C%20href%3Awindow.location.href%2C%20ts%3Anew%20Date().toISOString()%20%7D)%3B%20console.info(NS%2C%22start%22%2Cwindow.location.href)%3B%20%7D%20catch(_)%20%7B%7D%20if(window.__WEB_TO_FIGMA_GRABBER_BOOKMARKLET_ACTIVE__)%7B%20console.warn(NS%2C%22bookmarklet%20already%20active%22)%3B%20window.alert(%22Web-to-Figma%20Grabber%20bookmarklet%20already%20active.%22)%3B%20return%3B%20%7D%20window.__WEB_TO_FIGMA_GRABBER_BOOKMARKLET_ACTIVE__%3Dtrue%3B%20var%20url%3D%22https%3A%2F%2Flabs.beckharrisdesign.com%2Fscripts%2Fweb-to-figma-grabber-loader.js%3Fv%3D%22%2BDate.now()%3B%20var%20s%3Ddocument.createElement(%22script%22)%3B%20s.src%3Durl%3B%20s.async%3Dtrue%3B%20s.onload%3Dfunction()%7B%20try%20%7B%20window.__WEB_TO_FIGMA_GRABBER_DEBUG__.events.push(%7B%20stage%3A%22bookmarklet-loader-loaded%22%2C%20src%3Aurl%2C%20ts%3Anew%20Date().toISOString()%20%7D)%3B%20console.info(NS%2C%22loader%20script%20loaded%22%2Curl)%3B%20%7D%20catch(_)%20%7B%7D%20window.__WEB_TO_FIGMA_GRABBER_BOOKMARKLET_ACTIVE__%3Dfalse%3B%20%7D%3B%20s.onerror%3Dfunction(ev)%7B%20try%20%7B%20window.__WEB_TO_FIGMA_GRABBER_DEBUG__.events.push(%7B%20stage%3A%22bookmarklet-loader-error%22%2C%20src%3Aurl%2C%20eventType%3Aev%26%26ev.type%2C%20ts%3Anew%20Date().toISOString()%20%7D)%3B%20console.error(NS%2C%22loader%20failed%20to%20load%22%2Curl%2Cev)%3B%20%7D%20catch(_)%20%7B%7D%20window.__WEB_TO_FIGMA_GRABBER_BOOKMARKLET_ACTIVE__%3Dfalse%3B%20window.alert(%22Web-to-Figma%20loader%20failed%20to%20load.%20Check%20console%20for%20%5Bweb-to-figma-grabber%5D.%22)%3B%20%7D%3B%20document.head.appendChild(s)%3B%20%7D)()%3B"
          title="Figma Grabber — drag this to your bookmarks bar"
          draggable="true"
          onclick="return false;"
        >
          Figma Grabber
        </a>
      </div>

    </div>
  </section>
  </main>

</body>
</html>
