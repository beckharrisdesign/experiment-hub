# Project OpenSpec defaults (see `@fission-ai/openspec` project-config).
# New changes use `schema` unless overridden in openspec/changes/<name>/.openspec.yaml.
schema: experiment-hub

context: |
  Experiment Hub workflow (experiment-hub schema):

  Ladder — human-authored anchor → flexible discovery → Proceed on rubric → OpenSpec proposal/spec/tasks.

  **Human anchor** — cite founder prose in-repo (README, charter, PRD stub, pasted note) before wide autonomous discovery
  unless founder waived. Research-first / contract-first allowed.

  **Discovery** — flexible: experiments/<slug>/docs/market-research.md, business-case.md, deeper PRD.

  **Proceed gate (sponsor-backed hub)** — align to labs.beckharrisdesign.com/scoring (fallback .cursor/rules/scoring-criteria.mdc).
  proposal.md Evidence → Proceed attestation. Non-sponsored hub maintenance: document N/A plainly if you use that carve-out.

  **Visual board** — mirror proposal to FigJam/light Figma after draft; link proposal Visual board + design.md. See .cursor/rules/figma.mdc.

  **Opt out** — per change: schema: quickstart (vanilla) or schema: spec-driven (upstream).
