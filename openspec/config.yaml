# Project OpenSpec defaults (see `@fission-ai/openspec` project-config).
# New changes use `schema` unless overridden in openspec/changes/<name>/.openspec.yaml.
schema: experiment-hub-lite

context: |
  Experiment Hub workflow (experiment-hub-lite schema — default for spikes):

  **Human anchor** — founder prose quoted in proposal.md (or experiments/<slug>/docs/intent.md) before specs/design/tasks.

  **Outcomes-first** — Who / Job / Done when drive specs (max 5 requirements) and tasks §1 (user-visible checkboxes).

  **Skills per artifact** — experiment-creator (proposal), prd-writer (specs/tasks §1), design-advisor (design), prototype-builder (apply). See openspec/schemas/experiment-hub-lite/schema.yaml instructions.

  **Lite vs full** — This schema omits Evidence / Proceed / Visual board in proposal. Use `schema: experiment-hub` in .openspec.yaml for sponsor ladder; `schema: quickstart` for vanilla upstream.

  **Apply end** — Every schema’s `apply.instruction` ends with commit + push + **request a draft PR** (`gh pr create --draft` when needed) so CI runs; see `skills/openspec-apply-change.md` step 8.
