name: experiment-hub-lite
version: 1
description: Intent-first OpenSpec for experiment spikes — hub skill voices per artifact, no sponsor ladder boilerplate.

artifacts:
  - id: proposal
    generates: proposal.md
    description: Human anchor, outcomes, and scope in plain language (strategist voice).
    template: proposal.md
    instruction: |
      Before writing, read `skills/experiment-creator.md` and apply its voice and prohibitions to this artifact only.

      **Human anchor (required):** Quote founder prose verbatim (1–3 sentences). Do not proceed with an empty anchor or agent-only paraphrase without a quoted line. Accept `experiments/<slug>/docs/intent.md` if it exists.

      **Outcomes (required):** Fill Who / Job / Done when / Not doing before Why.

      **Lite constraints:** Max 2 new capabilities (kebab-case). Omit Evidence, Proceed attestation, and Visual board (those belong in full `experiment-hub` or design.md). If `experiments/<slug>/docs/PRD.md` exists, link it under Optional links instead of duplicating TAM or business case.

      **Stop rule:** After writing proposal.md, stop and wait for explicit user approval before creating specs, design, or tasks.

  - id: specs
    generates: specs/**/*.md
    description: PM-style requirements with scenarios (prd-writer voice, max 5 requirements).
    template: spec.md
    requires:
      - proposal
    instruction: |
      Before writing, read `skills/prd-writer.md` and apply outcomes + scenario patterns to this artifact only (not a full PRD file unless the user asked).

      **Outcomes:** Repeat or point to proposal Outcomes at the top.

      **Requirements:** Max 5 `### Requirement:` blocks. Each requirement: one plain-language sentence, optional **Fails until:** line, then normative SHALL (one line max), then at least one `#### Scenario:` with WHEN/THEN.

      **Alignment:** Scenario titles must match tasks.md §1 checkboxes 1:1.

      **Delta ops:** Use ADDED/MODIFIED/REMOVED only when promoting to `openspec/specs/`; for new capabilities, ADDED is enough.

      **Stop rule:** After writing spec(s), stop and wait for explicit user approval before design or tasks.

  - id: design
    generates: design.md
    description: User flow, Figma, and breakpoints (design-advisor voice).
    template: design.md
    requires:
      - proposal
    instruction: |
      Before writing, read `skills/design-advisor.md` and `rules/figma.mdc`; apply checklist thinking to this artifact only (full design report only if user asks).

      **Figma gate (UI changes — REQUIRED, not skippable):** Any change that adds or alters UI MUST produce a Figma **as-is + proposed** pair before design.md is approved — the same treatment `openspec/changes/stop-the-leaks/design.md` used:
        1. **As-is frame** — the current surface reconstructed from code (or captured from the running page via `generate_figma_design`); flag any non-code-derivable values as reference per `rules/figma.mdc`.
        2. **Proposed frame(s)** — the changed surface, built on the hub design system (MVDS + `tailwind.config.ts` / `globals.css` tokens), not bespoke chrome.
      Then fill the Visual design / Figma table with the real **file URL**, **as-is + proposed frame names**, **library/version**, breakpoints (BHD Content Types S=480px / L=1024px), and any Code Connect note. "Reuses existing components" is NOT grounds to skip — reused components still get placed in a proposed frame.

      **N/A is allowed ONLY for genuinely API-only / no-UI changes** — one row "N/A — no UI" with a brief rationale. If the change renders anything a user sees, it is not API-only.

      **Breakpoints:** Reference hub `design-guidelines.mdc` for tokens and spacing.

      **Stop rule:** After writing design.md, stop and wait for explicit user approval before tasks.

  - id: tasks
    generates: tasks.md
    description: User-outcome checkboxes first, then prototype and implementation (prd-writer §0 + prototype-builder).
    template: tasks.md
    requires:
      - specs
      - design
    instruction: |
      Before writing §1, read `skills/prd-writer.md` (outcomes / scenario mapping). Before §2+, read `skills/prototype-builder.md`.

      **§1 User outcomes:** Copy every spec scenario as a numbered checkbox (1.1, 1.2, …). Wording should be user-visible ("User can …"), not file paths.

      **§2–3:** Prototype shell under `experiments/<slug>/prototype/` when applicable; document dev command with the same package manager as README (`npm` or `pnpm` — do not invent `pnpm` if the repo uses npm).

      **§4 QA:** Include manual walkthrough aligned to Outcomes and automated smoke (vitest or README checklist).

      **Stop rule:** After writing tasks.md, stop and wait for explicit user approval before `/opsx:apply`.

apply:
  requires:
    - tasks
  instruction: |
    Read `skills/openspec-apply-change.md` and `skills/prototype-builder.md`.

    Before coding: read proposal Outcomes and tasks.md §1; confirm Human anchor still matches what you are building.

    **Prototype path:** Prefer `experiments/<slug>/prototype/`. Assign port from `docs/PROTOTYPE_PORTS.md` and register in `data/prototypes.json` if new.

    **Package manager:** Match README and root `package.json` scripts (this repo often uses `npm`).

    **Completion:** User runs manual §1 checks before `/opsx:archive`. Do not archive until outcomes checkboxes are satisfied or explicitly waived.

    **When apply finishes** (tasks done, paused with progress, or blocked after coding): follow `skills/openspec-apply-change.md` step 8 — commit (conventional message per `rules/commit-messages.mdc`; brief but substantive body; branch `<harness>/<change-name>` per `rules/github-workflow.mdc` — e.g. `claude/<change-name>` under Claude Code, not a hardcoded `cursor/`), push, open or update a **ready-for-review** PR via `gh` (not draft, so Copilot reviews immediately — see `rules/github-workflow.mdc`) so CI/CD runs, then run the Copilot review loop. Skip only if the session changed no files. Never merge or approve the PR.
